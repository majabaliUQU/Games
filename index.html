<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohammed Jabali Games</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    height:100vh;
    overflow:hidden;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    display:flex;
    flex-direction:column;
}

header{
    text-align:center;
    padding:25px 20px;
}

header h1{
    font-size:2.2rem;
    margin-bottom:10px;
}

header p{
    color:#cbd5e1;
}

.games-container{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    padding:20px;
}

.game-card{
    width:380px;
    background:white;
    color:#111827;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    transition:transform 0.3s ease;
}

.game-card:hover{
    transform:translateY(-8px);
}

.game-card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.game-content{
    padding:20px;
    text-align:center;
}

.game-content h2{
    margin-bottom:15px;
}

.play-btn{
    display:inline-block;
    text-decoration:none;
    background:#2563eb;
    color:white;
    padding:12px 25px;
    border-radius:10px;
    font-weight:bold;
    transition:0.3s;
}

.play-btn:hover{
    background:#1d4ed8;
}

footer{
    padding:20px;
    text-align:center;
    background:rgba(255,255,255,0.05);
}

footer h3{
    margin-bottom:10px;
}

.whatsapp-btn{
    display:inline-block;
    text-decoration:none;
    background:#25D366;
    color:white;
    padding:12px 24px;
    border-radius:10px;
    font-weight:bold;
    margin-top:10px;
}

.whatsapp-btn:hover{
    opacity:0.9;
}

@media(max-width:900px){
    .games-container{
        flex-direction:column;
        gap:20px;
    }

    .game-card{
        width:90%;
        max-width:400px;
    }
}
</style>
</head>

<body>

<header>
    <h1>🎮 Mohammed Jabali Games</h1>
    <p>Play and enjoy our educational and entertaining games</p>
</header>

<section class="games-container">

    <div class="game-card">
        <img src="https://raw.githubusercontent.com/majabaliUQU/Games/main/Sequence-Master.png" alt="Sequence Master">
        <div class="game-content">
            <h2>Sequence Master</h2>
            <a class="play-btn"
               href="https://majabaliuqu.github.io/Sequence-Master/"
               target="_blank">
               Play Now
            </a>
        </div>
    </div>

    <div class="game-card">
        <img src="https://raw.githubusercontent.com/majabaliUQU/Games/main/Brick-Breaker-Game.png" alt="Brick Breaker Game">
        <div class="game-content">
            <h2>Brick Breaker Game</h2>
            <a class="play-btn"
               href="https://majabaliuqu.github.io/Brick-Breaker-Game/"
               target="_blank">
               Play Now
            </a>
        </div>
    </div>

</section>

<footer>
    <h3>Developer: Mohammed Jabali</h3>
    <p>Umm Al-Qura University</p>

    <a class="whatsapp-btn"
       href="https://wa.me/966505501575"
       target="_blank">
       Contact via WhatsApp
    </a>
</footer>

</body>
</html>
